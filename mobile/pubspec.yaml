name: pfa_mobile
description: Personal Finance Assistant — Flutter mobile app (Android first).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase / auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  cloud_functions: ^5.1.3

  # Networking / state / formatting
  http: ^1.2.2
  provider: ^6.1.2
  intl: ^0.19.0

  # Device features
  local_auth: ^2.3.0          # biometric app lock
  image_picker: ^1.1.2        # receipt capture (upload/OCR in Phase 6)
  plaid_flutter: ^4.1.0       # Plaid Link (add / re-auth a bank)

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
